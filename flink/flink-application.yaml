apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flink-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://downloads.apache.org/flink/flink-kubernetes-operator-helm-chart/
    chart: flink-kubernetes-operator
    targetRevision: 2.2.0
    helm:
      values: |
        watchNamespaces: ["flink"]
        operatorConfiguration:
          flink-conf.yaml: |
            kubernetes.operator.reconcile.interval: 15s
  destination:
    server: https://kubernetes.default.svc
    namespace: flink-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true