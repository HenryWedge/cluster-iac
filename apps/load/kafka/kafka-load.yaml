apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-load-generator
  template:
    metadata:
      labels:
        app: kafka-load-generator
    spec:
      containers:
        - name: kafka-load-generator
          image: apache/kafka:3.9.1
          imagePullPolicy: IfNotPresent

          env:
            - name: BROKER
              value: "kafka:9092"

            - name: TOPIC
              value: "load-test-topic"

            # -1 = unlimited throughput
            - name: THROUGHPUT
              value: "-1"

            # bytes per message
            - name: RECORD_SIZE
              value: "1024"

            # total messages
            - name: NUM_RECORDS
              value: "10000000"

          command:
            - /bin/bash
            - /scripts/producer.sh

          volumeMounts:
            - name: load-script
              mountPath: /scripts

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

      volumes:
        - name: load-script
          configMap:
            name: kafka-load-script
            defaultMode: 0755