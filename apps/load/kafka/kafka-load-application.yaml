apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-load
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/P-e-t-e-r-s-e-n/Bachelor
    targetRevision: HEAD
    path: apps/load/kafka/resource
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true