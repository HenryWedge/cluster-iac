apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: flink-session
  namespace: flink
spec:
  image: hendrikreiter/pyflink2.2.0-3.10
  imagePullPolicy: Always
  flinkVersion: v2_2
  serviceAccount: flink
  flinkConfiguration:
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: "9249"
  jobManager:
    resource:
      memory: "1024m"
      cpu: 0.5
  taskManager:
    podTemplate:
      spec:
        containers:
          - name: flink-main-container
            ports:
              - containerPort: 9249
                name: metrics
                protocol: TCP
    resource:
      memory: "8192m"
      cpu: 4
    replicas: 2
  mode: native