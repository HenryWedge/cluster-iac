apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-operator2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/HenryWedge/cluster-iac
    targetRevision: HEAD
    path: apps/kafka/application
  destination:
    server: https://kubernetes.default.svc
    namespace: '{{path.basename}}'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true