apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kafka-service-monitor
  namespace: monitoring
spec:
  selector:
    matchLabels:
      strimzi.io/cluster: kafka-cluster
      strimzi.io/kind: Kafka
      strimzi.io/name: kafka-cluster-kafka-exporter
  podMetricsEndpoints:
    - port: tcp-prometheus
      interval: 30s