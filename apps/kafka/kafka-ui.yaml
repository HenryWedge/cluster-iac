apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-ui
  namespace: argocd
spec:
  project: default
  source: |
    yamlApplicationConfig:
      kafka:
        clusters:
          - name: yaml
            bootstrapServers: kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
      auth:
        type: disabled
      management:
        health:
          ldap:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
