apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://quay.io/strimzi-helm/strimzi-kafka-operator
    chart: strimzi-kafka-operator
    targetRevision: 0.51.0
    helm:
      values: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
