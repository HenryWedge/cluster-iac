apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulsar-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://pulsar.apache.org/charts
    chart: pulsar
    targetRevision: 4.5.0
    helm:
      values: |
        victoria-metrics-k8s-stack:
          kube-state-metrics:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
